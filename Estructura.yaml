AWSTemplateFormatVersion: '2010-09-09'
Resources:
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316 # Asegúrate de que esta AMI exista en tu región
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref WebSG
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          # Parte 6: Despliegue de la app
          echo "<h1>Calculadora desplegada</h1>" > /var/www/html/index.html
          # Nota: En un entorno real aquí copiaríamos el index.html real del repositorio

  WebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          
